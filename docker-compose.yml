services:
  postgres:
    image: postgres:16-alpine
    container_name: douyin_generator_postgres
    environment:
      POSTGRES_DB: douyin_generator
      POSTGRES_USER: douyin
      POSTGRES_PASSWORD: douyin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douyin -d douyin_generator"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: douyin_generator_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

